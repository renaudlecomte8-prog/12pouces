media:
  input: public
  output: /

content:
  - name: contenu
    label: Contenu du site
    type: file
    path: src/data/content.json
    fields:
      - name: ateliers
        label: Dates des ateliers
        description: >-
          Gère librement ton calendrier : ajoute, modifie, réordonne ou
          supprime une date — n'importe quel jour (pas seulement le samedi).
          Seules les dates à venir s'affichent sur le site, triées dans l'ordre.
        type: object
        list: true
        fields:
          - { name: date, label: Date, type: date }
          - { name: horaire, label: Horaire (laisser vide = horaire par défaut), type: string }
          - { name: note, label: Note affichée (optionnel), type: string }
          - { name: annule, label: Atelier annulé, type: boolean, default: false }
      - name: atelier
        label: Valeurs par défaut
        type: object
        fields:
          - { name: horaire, label: Horaire par défaut, type: string }
          - { name: lieu_ligne1, label: Lieu — ligne 1, type: string }
          - { name: lieu_ligne2, label: Lieu — ligne 2, type: string }
      - name: intro_paragraphes
        label: Paragraphes de présentation
        type: text
        list: true
      - name: features
        label: Points clés (liste à puces)
        type: string
        list: true
      - name: contact
        label: Contact & accès
        type: object
        fields:
          - { name: email, label: Email, type: string }
          - { name: instagram_handle, label: Instagram (sans le @), type: string }
          - { name: lieu_nom, label: Nom du lieu, type: string }
          - { name: adresse, label: Adresse, type: string }
          - { name: metro_station, label: Station de métro, type: string }
          - { name: metro_lignes, label: Lignes de métro, type: string }
          - { name: horaires, label: Horaires, type: string }
